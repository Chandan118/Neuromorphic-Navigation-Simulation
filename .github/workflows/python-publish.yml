# Affiliation : Beijing Institute of Technology (BIT)
#
# NOTE: To enable PyPI publishing:
# 1. Go to https://pypi.org/manage/project/ and add a trusted publisher
# 2. In GitHub repo Settings > Environments, create environment named "pypi"
# 3. Set the environment URL to https://pypi.org/p/YOUR_PACKAGE_NAME

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    environment:
      name: pypi
      # Update with your actual PyPI project URL:
      # url: https://pypi.org/p/YOURPROJECT

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
